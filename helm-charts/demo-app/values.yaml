replicaCount: 1

image:
  repository: ghcr.io/stefanprodan/podinfo
  pullPolicy: IfNotPresent
  tag: "6.7.0"

service:
  type: ClusterIP
  port: 9898
  targetPort: 9898

metrics:
  enabled: true
  port: 9898
  path: /metrics

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  namespace: monitoring
  labels:
    release: kube-prometheus-stack

ingress:
  enabled: true
  host: demo-app.local

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
